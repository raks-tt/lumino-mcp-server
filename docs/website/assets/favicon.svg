<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#0a0e17"/>
  <!-- Stylized L shape with glow -->
  <g filter="url(#glow)">
    <!-- Vertical bar of L -->
    <rect x="8" y="6" width="4.5" height="20" rx="1" fill="#00e5ff"/>
    <!-- Horizontal bar of L -->
    <rect x="8" y="21.5" width="16" height="4.5" rx="1" fill="#00e5ff"/>
  </g>
  <!-- Circuit dots at corners -->
  <circle cx="10.25" cy="6" r="1.2" fill="#00e5ff" opacity="0.9"/>
  <circle cx="12.5" cy="6" r="0.8" fill="#00e5ff" opacity="0.5"/>
  <circle cx="8" cy="21.5" r="0.8" fill="#00e5ff" opacity="0.5"/>
  <circle cx="24" cy="21.5" r="1.2" fill="#00e5ff" opacity="0.9"/>
  <circle cx="24" cy="26" r="1.2" fill="#00e5ff" opacity="0.9"/>
  <circle cx="8" cy="26" r="0.8" fill="#00e5ff" opacity="0.5"/>
  <!-- Small circuit trace accent lines -->
  <line x1="14" y1="6" x2="17" y2="6" stroke="#00e5ff" stroke-width="0.6" opacity="0.35"/>
  <line x1="24" y1="19" x2="24" y2="20.5" stroke="#00e5ff" stroke-width="0.6" opacity="0.35"/>
</svg>
